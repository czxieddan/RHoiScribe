body = "This index links detailed on_action families. THIS, ROOT, FROM, FROM.FROM, PREV, and OWNER are hook-specific and cannot be assigned one global meaning. General and pulse hooks: on_startup, on_daily, on_daily_TAG, on_weekly, on_weekly_TAG, on_monthly, on_monthly_TAG. Politics and peace hooks: on_stage_coup, on_coup_succeeded, on_government_change, on_ruling_party_change, on_new_term_election, on_before_peace_conference_start, on_peaceconference_started, on_peaceconference_ended. Diplomacy and war hooks: on_send_volunteers, on_border_war_lost, on_war_relation_added, on_declare_war, on_war, on_peace, on_capitulation, on_capitulation_immediate, on_uncapitulation, on_annex, on_civil_war_end_before_annexation, on_civil_war_end, on_puppet, on_liberate, on_release_as_free, on_release_as_puppet, on_guarantee, on_military_access, on_offer_military_access, on_call_allies, on_join_allies, on_lend_lease, on_incoming_lend_lease, on_send_expeditionary_force, on_return_expeditionary_forces, on_request_expeditionary_forces, on_ask_for_state_control, on_give_state_control, on_peace_proposal, on_send_attache. Faction/autonomy/exile hooks, state/wargoal hooks, unit leader/military/ace hooks, and La Resistance/MIO hooks are listed in their own topics."

syntax_blocks = [
    "Read rhoiscribe://hoi4/knowledge/on_actions.general_pulses",
    "Read rhoiscribe://hoi4/knowledge/on_actions.politics_peace",
    "Read rhoiscribe://hoi4/knowledge/on_actions.diplomacy_war",
    "Read rhoiscribe://hoi4/knowledge/on_actions.faction_autonomy_exile",
