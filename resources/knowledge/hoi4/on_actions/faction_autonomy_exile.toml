id = "on_actions.faction_autonomy_exile"

title = "On action faction, autonomy, and government-in-exile hooks"

category = "on_actions"

file_types = [
    "txt"
]

tags = [
    "on_create_faction",
    "on_faction_formed",
    "on_offer_join_faction",
    "on_join_faction",
