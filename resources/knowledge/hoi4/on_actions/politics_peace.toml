id = "on_actions.politics_peace"

title = "On action politics, elections, and peace conference hooks"

category = "on_actions"

file_types = [
    "txt"
]

tags = [
    "on_stage_coup",
    "on_coup_succeeded",
    "on_government_change",
    "on_ruling_party_change",
